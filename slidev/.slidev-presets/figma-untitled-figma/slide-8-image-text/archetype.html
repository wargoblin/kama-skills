<!-- Figma archetype: figma-image-text — Large image left ~55%, heading+text right ~40% -->
<div style="position:absolute;inset:0;z-index:0;overflow:hidden;background:var(--bg-base);">
</div>
<div style="position:absolute;inset:0;z-index:1;display:flex;align-items:stretch;padding:44px 80px 0;">
  <div style="flex:1.3;display:flex;align-items:stretch;padding-right:32px;">
    <div class="card-solid" style="width:100%;border-radius:13px;"></div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;justify-content:flex-start;padding-top:16px;">
    <h2 style="font-family:var(--font-heading);font-size:2.2rem;font-weight:700;color:var(--color-text);line-height:1.15;margin-bottom:12px;">{{TITLE}}</h2>
    <p style="font-family:var(--font-body);font-size:1.25rem;color:var(--color-muted);line-height:1.45;text-align:left;">{{DESCRIPTION}}</p>
  </div>
</div>
<div class="slide-footer" style="position:absolute;bottom:0;left:0;right:0;">
  <div class="slide-footer-icon"></div>
  <span>{{BREADCRUMB}}</span>
  <span>{{SUBTITLE}}</span>
  <span>{{SECTION}}</span>
  <span style="margin-left:auto;">{{PAGE_NUM}}</span>
</div>
