<!-- Figma archetype: figma-two-col-intro — Large heading left ~50%, description text right ~40%, ALL on white bg -->
<div style="position:absolute;inset:0;z-index:0;overflow:hidden;background:var(--bg-base);">
</div>
<div style="position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;justify-content:space-between;padding:64px 80px 0;">
  <div style="display:flex;gap:48px;align-items:flex-start;">
    <div style="flex:1.2;">
      <h1 style="font-family:var(--font-heading);font-size:3.5rem;font-weight:700;color:var(--color-text);line-height:1.1;">{{TITLE}}</h1>
    </div>
    <div style="flex:1;">
      <p style="font-family:var(--font-body);font-size:1.25rem;color:var(--color-muted);line-height:1.45;text-align:left;">{{DESCRIPTION}}</p>
    </div>
  </div>
  <div class="slide-footer">
    <div class="slide-footer-icon"></div>
    <span>{{BREADCRUMB}}</span>
    <span>{{SUBTITLE}}</span>
    <span>{{SECTION}}</span>
    <span style="margin-left:auto;">{{PAGE_NUM}}</span>
  </div>
</div>
<!-- NOTE: NO bg-alt panel. Both columns on pure white background per Figma original. -->
