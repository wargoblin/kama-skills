<!-- Figma archetype: figma-section — Gradient mesh background, section heading top-left -->
<div style="position:absolute;inset:0;z-index:0;overflow:hidden;" class="{{GRADIENT_CLASS}}">
</div>
<div style="position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;justify-content:space-between;padding:64px 80px 0;">
  <div>
    <h1 style="font-family:var(--font-heading);font-size:5.5rem;font-weight:700;color:#FFFFFF;line-height:1.05;">{{TITLE}}</h1>
  </div>
  <div class="slide-footer slide-footer-dark">
    <div class="slide-footer-icon" style="background:rgba(255,255,255,0.3);"></div>
    <span>{{BREADCRUMB}}</span>
    <span>{{SUBTITLE}}</span>
    <span>{{SECTION}}</span>
    <span style="margin-left:auto;">{{PAGE_NUM}}</span>
  </div>
</div>
